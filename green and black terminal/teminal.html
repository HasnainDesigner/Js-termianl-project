<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal // Root Access</title>



<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: #131111;
    color: #33ff33;
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    flex-direction: column; /* Stack button over terminal window */
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
    background-size: 100% 4px, 6px 100%;
    transition: background-color 0.4s ease; /* Adds smooth flash transition to screen color */
}

.body_btn {
    margin-bottom: 20px; /* Reduced layout margin to keep screen centered */
}

.clr_btn {
    padding: 12px 24px;
    font-size: 16px;
    background-color: #222;
    border: 1px solid #33ff33;
    color: white;
    cursor: pointer;
    border-radius: 4px;
    box-shadow: 0 0 10px rgba(51, 255, 51, 0.2);
}

.clr_btn:hover {
    background-color: #33ff33;
    color: black;
}

.terminal-container {
    width: 90%;
    max-width: 700px;
    height: 400px;
    background-color: #050505;
    border: 1px solid #33ff33;
    border-radius: 6px;
    box-shadow: 0 0 20px rgba(51, 255, 51, 0.2);
    display: flex;
    flex-direction: column;
}

.terminal-header {
    background-color: #111;
    padding: 10px;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
}

.dot {
    height: 12px;
    width: 12px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
}
.red { background-color: #ff5f56; }
.yellow { background-color: #ffbd2e; }
.green { background-color: #27c93f; }

.terminal-title {
    color: #666;
    font-size: 0.85rem;
    margin-left: 15px;
}

.terminal-body {
    padding: 20px;
    flex-grow: 1;
    overflow-y: auto;
    font-size: 1.1rem;
    line-height: 1.6;
    text-shadow: 0 0 5px rgba(51, 255, 51, 0.5);
    scroll-behavior: smooth;
}

.prompt {
    color: #11aa11;
    font-weight: bold;
}

.cursor {
    font-weight: bold;
    animation: blink 1s infinite;
}

@keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
}
</style>




</head>
<body>



<div class="body_btn">
<button class="clr_btn" onclick="changeColor()">Download Data</button>
</div>

    <div class="terminal-container">
        <div class="terminal-header">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
            <span class="terminal-title">bash — root@localhost: ~</span>
        </div>
        <div class="terminal-body">


            <p class="line"><span class="prompt">root@system:~#</span> initializing exploit...</p>
            <p class="line">connecting to server... <span class="status-success">[SUCCESS]</span></p>
            <p class="line">bypassing firewall... done.</p>
            <p class="line-input"><span class="prompt">root@system:~#</span> accessing core database<span class="cursor"></span></p>


        </div>
    </div>                                                                                           <!-- CURSOR        -->

    <!-- <script src="terminal.js"> -->
    <script src="code.js">

    </script>
</body>
</html>
